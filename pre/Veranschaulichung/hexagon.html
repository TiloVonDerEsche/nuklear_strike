<!DOCTYPE html>
<html>
	<head>
		<title>NuklearStrike</title>
		<link rel="stylesheet" href="src/CSS/style.css">
	</head>
	<body>
		<div class="hexagon">
			<div class="hexagon-top-row">
				<div class="left"></div>
				<div class="right"></div>
			</div>
			<div class="hexagon-bottom-row">
				<div class="bottom-left"></div>
				<div class="bottom-right"></div>
			</div>
		</div>
		
		<!--  -->
		<div class="hexagon">
			<div class="hexagon-top-row">
				<div class="d-left"></div>
				<div class="d-right"></div>
			</div>
			<div class="hexagon-bottom-row">
				<div class="d-bottom-left"></div>
				<div class="d-bottom-right"></div>
			</div>
		</div>

	</body>
	
	<style>
			.hexagon {
				padding: 2px 0 2px 0;
			}

			.hexagon:hover {
				opacity: 50%;
			}

			.hexagon-top-row, .hexagon-bottom-row {
				display: flex;
			}
			.left, .right {
				width: 0;
				height: 0;
				border-style: solid;
				border-width: 0 50px 86px 50px;

			}

			.bottom-left, .bottom-right {
				width: 0;
				height: 0;
				border-style: solid;
				border-width: 86px 50px 0 50px;
			}
			
			.left {
				border-color: transparent #0eeb15 #0ec414 transparent;
			}

			.right {
				border-color: transparent transparent #0ec414 #0eeb15;
			}
			
			.bottom-left {
				border-color: #0eeb15 #0ec414 transparent transparent;
			}

			.bottom-right {
				border-color: #0eeb15 transparent transparent #0ec414;
			}
			
			.d-left {
				border-color: transparent #0eeb15 #0ec414 transparent;
			}

			.d-right {
				border-color: transparent transparent #0ec414 #0eeb15;
			}
			
			.d-bottom-left {
				border-color: #0eeb15 #0ec414 transparent transparent;
			}

			.d-bottom-right {
				border-color: #0eeb15 transparent transparent #0ec414;
			}
	</style>
</html>
