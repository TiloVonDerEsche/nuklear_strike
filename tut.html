<!DOCTYPE html>
<html>
	<head>
		<title>NuklearStrike</title>
		<link rel="stylesheet" href="src/CSS/style.css">
	</head>
	<body>


		<!--------------------------------------------------										
		-------------Hauptmenü
		--------------------------------------------------->
		<div class="tut-background">
			<label class="menu-title">Nuklear Strike</label> <br>
			
			<div class="hexagon" id="wonderProp-menu">
				<div class="hexagon-top-row">
					<div class="won-left"></div> <!--"won" steht hier für Wonder-->
					<div class="won-right"></div>
				</div>
				<div class="hexagon-bottom-row">
					<div class="won-bottom-left"></div>
					<div class="won-bottom-right"></div>
				</div>
			</div>
			
			<div class="tut-helpful">
				<div class="tut-buildings">
					<!--Haus-->
					<div id="house">
						<div id="front">
							<span class="roof"></span>
							<span class="triangle"></span>
							<span class="sidewall"></span>
							<div class="wall">
								<span id="top-window"></span>
								<span id="middle-window"></span>
								<span id="door"></span>
							</div>
						</div>
						<div id="garage">
							<span class="roof"></span>
							<span class="triangle"></span>
							<span class="sidewall"></span>
							<div class="wall"></div>
						</div>
					</div>
					<br> <br><br>
					
					<!--Feld-->
					<div class="hexagon" id="feldProp"  style="margin:50px 0 0 0">
						<div class="hexagon-top-row">
							<div class="f-left"></div>
							<div class="f-right"></div>
						</div>
						<div class="hexagon-bottom-row">
							<div class="f-bottom-left"></div>
							<div class="f-bottom-right"></div>
						</div>
					</div>

					<!-- Forester -->
					<div class="hexagon" id="foresterProp">
						<div class="hexagon-top-row">
							<div class="for-left"></div> <!--"for" steht hier für Forest-->
							<div class="for-right"></div>
						</div>
						<div class="hexagon-bottom-row">
							<div class="for-bottom-left"></div>
							<div class="for-bottom-right"></div>
						</div>
					</div>

					<!-- Quarry -->
					<div class="hexagon" id="quarryProp">
						<div class="hexagon-top-row">
							<div class="qua-left"></div> <!--"qua" steht hier für Quarry-->
							<div class="qua-right"></div>
						</div>
						<div class="hexagon-bottom-row">
							<div class="qua-bottom-left"></div>
							<div class="qua-bottom-right"></div>
						</div>
					</div>

					<!-- Wonder -->
					<div class="hexagon" id="wonderProp">
						<div class="hexagon-top-row">
							<div class="won-left"></div> <!--"won" steht hier für Wonder-->
							<div class="won-right"></div>
						</div>
						<div class="hexagon-bottom-row">
							<div class="won-bottom-left"></div>
							<div class="won-bottom-right"></div>
						</div>
					</div>
				</div>
			
				<div class="tut-des">
					<label class="tut-lbl">
						-> Das Haus erhöht die Bevölkerungskapazität. Bevölkerung zahlt Steuern und braucht Nahrung. <br><br>
						-> Das Weizenfeld produziert Nahrung <br><br><br><br>
						-> Der Wald produziert Holz. <br><br><br><br>
						-> Der Steinbruch produziert Stein. <br><br><br><br>
						-> Das Siegeswunder leitet beim Bau den Sieg ein. <br><br><br><br><br><br>
					</label>
				</div>
			</div>
			
			
			<div class="tut-tips">
				<label class="tut-lbl1">
					Um ein Gebäude zu bauen klicken Sie es in der unteren Auswahlsleiste an <br>
					und anschließend auf ein Sechseck im Spielfeld.<br>
					 Oben links können Sie mit dem "Explore" Button das Spielfeld vergrößern<br>
					 und mit dem "buyAmount" Eingabefeld angeben wie viel Gebäude Sie <br>
					 kaufen / bauen wollen. Anstatt den "endTurn" Button zu betätigen um die<br>
					 Runde zu beenden, können Sie Space drücken / halten.<br>
					 Das Ziel des Spiels ist es nicht zu verhungern.<br>
					 Bauen Sie hierfür Felder und seien Sie mit der Bevölkerungsexpansion<br>
					 vorsichtig. Sie siegen nach dem Bau des ersten Wunders(rotes Feld),<br>
					 jedoch können Sie nach dem Sieg noch weiterspielen.<br>
				</label>
			</div>
			
			
			<button class="tut-btn" onclick="location.href='index.html'">Menu</button> <br>

		</div>
	</body>
</html>
